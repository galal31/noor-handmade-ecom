<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{subject}}</title>
</head>
<body style="margin:0;padding:0;background:#fdf8f0;color:#3c2d26;font-family:Tahoma,Arial,sans-serif;direction:rtl;">
    <div style="display:none;max-height:0;overflow:hidden;opacity:0;color:transparent;">{{preheader}}</div>
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#fdf8f0;">
        <tr>
            <td align="center" style="padding:32px 14px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:620px;background:#ffffff;border:1px solid #eadfd7;border-radius:24px;overflow:hidden;box-shadow:0 18px 45px rgba(86,52,33,.10);">
                    <tr>
                        <td align="center" style="padding:36px 28px 30px;background:#a0522d;color:#ffffff;">
                            <img src="{{logo_url}}" width="92" height="92" alt="Noor Handmade" style="display:block;width:92px;height:92px;object-fit:cover;border:4px solid #ffffff;border-radius:22px;box-shadow:0 10px 25px rgba(55,25,11,.25);">
                            <h1 style="margin:18px 0 5px;font-size:26px;line-height:1.4;color:#ffffff;">Noor Handmade</h1>
                            <p style="margin:0;color:#f8e8dc;font-size:13px;letter-spacing:.5px;">قطع يدوية مصنوعة بحب</p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:38px 42px 18px;text-align:right;">
                            <p style="margin:0 0 10px;color:#a0522d;font-size:12px;font-weight:700;letter-spacing:1px;">{{eyebrow}}</p>
                            <h2 style="margin:0 0 20px;color:#34261f;font-size:25px;line-height:1.5;">{{title}}</h2>
                            <p style="margin:0 0 14px;color:#4c3b32;font-size:16px;line-height:1.9;"><strong>مرحبًا {{full_name}}،</strong></p>
                            <p style="margin:0;color:#6e5d54;font-size:15px;line-height:2;">{{message}}</p>
                        </td>
                    </tr>
                    <tr>
                        <td align="center" style="padding:18px 42px 28px;">
                            <a href="{{action_url}}" style="display:inline-block;min-width:220px;padding:15px 28px;background:#a0522d;color:#ffffff;text-decoration:none;border-radius:14px;font-size:16px;font-weight:700;box-shadow:0 10px 22px rgba(160,82,45,.20);">{{action_label}}</a>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:0 42px 34px;">
                            <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#fff8f3;border:1px solid #f0dfd2;border-radius:14px;">
                                <tr><td style="padding:16px 18px;color:#795f51;font-size:13px;line-height:1.8;">⏱ {{expiry_note}}</td></tr>
                            </table>
                            <p style="margin:22px 0 8px;color:#8a776d;font-size:12px;line-height:1.8;">إذا لم يعمل الزر، انسخ الرابط التالي وافتحه في المتصفح:</p>
                            <p style="margin:0;direction:ltr;text-align:left;word-break:break-all;color:#a0522d;font-size:11px;line-height:1.7;">{{action_url}}</p>
                            <p style="margin:24px 0 0;padding-top:20px;border-top:1px solid #eee5df;color:#8a776d;font-size:12px;line-height:1.8;">🔒 {{security_note}}</p>
                        </td>
                    </tr>
                    <tr>
                        <td align="center" style="padding:20px;background:#34261f;color:#d9c9bf;font-size:11px;line-height:1.8;">
                            © {{year}} Noor Handmade — جميع الحقوق محفوظة
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
